    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;

        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #16213e 25%, #0f3460 50%, #16213e 75%, #0a0a2e 100%);

        body::before {
            content: '';

                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(174, 198, 255, 0.15) 0%, transparent 50%),

        .stars {

        .star {
            position: absolute;

        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;

        }

        .header {
            text-align: center;

        }

        .album-cover {
            width: 150px;

        .album-cover:hover {

        .main-title {

        .artist-name {

        .event-date {

        .spotify-link {
            display: inline-block;
            background: linear-gradient(135deg, #1db954 0%, #1ed760 100%);

        .spotify-link:hover {

        .progress-container {

        .progress-bar {
            height: 100%;

        .progress-text {
            text-align: center;

        }

        .filter-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .timezone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .timezone-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .timezone-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .timezone-card.active::before {
            opacity: 1;
        }

        .timezone-card.active {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.2);
            transform: translateY(-5px) scale(1.02);
        }

        .timezone-card.completed {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(10px) scale(0.95);
            opacity: 0.4;
            filter: grayscale(0.5);
        }

        .timezone-card.completed::before {
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            opacity: 1;
        }

        .timezone-card.hidden {
            transform: translateY(20px) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        .timezone-card.filtering-out {
            animation: filterOut 0.6s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        .timezone-card.filtering-in {
            animation: filterIn 0.6s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        @keyframes filterOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-30px) scale(0.8); opacity: 0; }
        }

        @keyframes filterIn {
            0% { transform: translateY(30px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }

        .timezone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .timezone-name {
            font-family: 'Playfair Display', serif;

        }

        .timezone-offset {
            font-size: 0.9rem;
            padding: 0.3rem 0.8rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;

        }

        .countdown-display {

            margin-bottom: 1.5rem;
        }

        .countdown-time {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;

            margin-bottom: 0.5rem;

            transition: all 0.4s ease;
        }

        .countdown-label {
            font-size: 0.9rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .status-upcoming {
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
            border: 1px solid rgba(79, 172, 254, 0.3);
        }

        .status-live {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.3);
            animation: pulse 2s infinite;
        }

        .status-completed {
            background: rgba(108, 117, 125, 0.2);
            color: #6c757d;
            border: 1px solid rgba(108, 117, 125, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .countries-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .country-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .country-tag:hover {
            background: rgba(255, 255, 255, 0.2);

        .clock-decoration {
            position: absolute;
            top: -50px;

            animation: rotate 60s linear infinite;

        @keyframes rotate {
            from { transform: rotate(0deg); }

        @media (max-width: 768px) {

            .filter-controls {

<body>
    <div class="stars"></div>
    
    <div class="container">

        </div>

        <div class="timezone-grid" id="timezoneGrid">
            <!-- Timezone cards will be dynamically generated -->
        </div>

        <div class="credits">
            vibecoded with <a href="#">Claude Sonnet 4</a> by <strong>appleflyer</strong>
        </div>
    </div>

    <script>
        const timezones = [
            { offset: 12, name: "UTC+12", countries: ["New Zealand", "Fiji", "Marshall Islands", "Nauru", "Tuvalu"] },
            { offset: 11, name: "UTC+11", countries: ["Solomon Islands", "Vanuatu", "New Caledonia"] },
            { offset: 10, name: "UTC+10", countries: ["Australia (East)", "Papua New Guinea", "Guam"] },
            { offset: 9, name: "UTC+9", countries: ["Japan", "South Korea", "Indonesia (East)"] },
            { offset: 8, name: "UTC+8", countries: ["China", "Singapore", "Malaysia", "Philippines", "Taiwan"] },
            { offset: 7, name: "UTC+7", countries: ["Thailand", "Vietnam", "Indonesia (West)", "Cambodia", "Laos"] },
            { offset: 6, name: "UTC+6", countries: ["Bangladesh", "Kazakhstan (East)", "Kyrgyzstan"] },
            { offset: 5.5, name: "UTC+5:30", countries: ["India", "Sri Lanka"] },
            { offset: 5, name: "UTC+5", countries: ["Pakistan", "Kazakhstan (West)", "Uzbekistan", "Tajikistan"] },
            { offset: 4, name: "UTC+4", countries: ["UAE", "Oman", "Georgia", "Armenia", "Azerbaijan"] },
            { offset: 3, name: "UTC+3", countries: ["Russia (West)", "Saudi Arabia", "Iraq", "Kenya", "Ethiopia"] },
            { offset: 2, name: "UTC+2", countries: ["South Africa", "Egypt", "Finland", "Greece", "Romania"] },
            { offset: 1, name: "UTC+1", countries: ["Germany", "France", "Spain", "Italy", "Poland"] },
            { offset: 0, name: "UTC+0", countries: ["UK", "Ireland", "Portugal", "Morocco", "Ghana"] },
            { offset: -1, name: "UTC-1", countries: ["Cape Verde", "Azores"] },
            { offset: -2, name: "UTC-2", countries: ["South Georgia", "South Sandwich Islands"] },
            { offset: -3, name: "UTC-3", countries: ["Brazil (East)", "Argentina", "Uruguay", "French Guiana"] },
            { offset: -4, name: "UTC-4", countries: ["Canada (Atlantic)", "Venezuela", "Bolivia", "Chile"] },
            { offset: -5, name: "UTC-5", countries: ["USA (East)", "Canada (East)", "Colombia", "Peru", "Ecuador"] },
            { offset: -6, name: "UTC-6", countries: ["USA (Central)", "Mexico", "Guatemala", "Costa Rica"] },
            { offset: -7, name: "UTC-7", countries: ["USA (Mountain)", "Canada (Mountain)"] },
            { offset: -8, name: "UTC-8", countries: ["USA (Pacific)", "Canada (Pacific)"] },
            { offset: -9, name: "UTC-9", countries: ["Alaska"] },
            { offset: -10, name: "UTC-10", countries: ["Hawaii", "Aleutian Islands"] },
            { offset: -11, name: "UTC-11", countries: ["American Samoa", "Niue"] }
        ];

        let currentFilter = 'all';

        function createStars() {
            const starsContainer = document.querySelector('.stars');
            const numStars = 80;
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        function getTimezoneEventTime(offset) {
            // For each timezone, the event happens at midnight local time on Aug 22
            // We need to convert this to UTC time
            
            const year = 2025;
            const month = 7; // August (0-indexed)
            const day = 22;
            
            // Create UTC date for when event happens in this timezone
            const utcHour = 0 - offset; // If UTC+8, then UTC time is 16:00 on Aug 21
            let utcDay = day;
            let utcMonth = month;
            let utcYear = year;
            
            // Handle day overflow
            if (utcHour < 0) {
                utcDay = day - 1;
                const utcHourAdjusted = 24 + utcHour; // Convert negative hour to previous day
                if (utcDay < 1) {
                    utcMonth = month - 1;
                    utcDay = 31; // Simplified for August
                    if (utcMonth < 0) {
                        utcYear = year - 1;
                        utcMonth = 11;
                    }
                }
                return new Date(Date.UTC(utcYear, utcMonth, utcDay, utcHourAdjusted, 0, 0));
            } else if (utcHour >= 24) {
                utcDay = day + 1;
                const utcHourAdjusted = utcHour - 24;
                return new Date(Date.UTC(utcYear, utcMonth, utcDay, utcHourAdjusted, 0, 0));
            } else {
                return new Date(Date.UTC(utcYear, utcMonth, utcDay, utcHour, 0, 0));
            }
        }

        function formatCountdown(ms) {
            if (ms <= 0) return "Released!";
            
            const days = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);
            
            if (days > 0) {
                return `${days}d ${hours}h ${minutes}m ${seconds}s`;
            } else if (hours > 0) {
                return `${hours}h ${minutes}m ${seconds}s`;
            } else {
                return `${minutes}m ${seconds}s`;
            }
        }

        function getTimezoneStatus(offset) {
            const now = new Date();
            const eventTime = getTimezoneEventTime(offset);
            const timeDiff = eventTime - now;
            
            if (timeDiff <= 0) {
                return 'completed';
            } else if (timeDiff <= 24 * 60 * 60 * 1000) { // Within 24 hours
                return 'active';
            } else {
                return 'upcoming';
            }
        }

        function updateGlobalProgress() {
            const completedCount = timezones.filter(tz => getTimezoneStatus(tz.offset) === 'completed').length;
            const progress = (completedCount / timezones.length) * 100;
            
            document.getElementById('globalProgress').style.width = progress + '%';
            document.getElementById('progressText').textContent = 
                `${completedCount} of ${timezones.length} timezones released (${Math.round(progress)}%)`;
        }

        function createTimezoneCard(timezone) {
            const now = new Date();
            const eventTime = getTimezoneEventTime(timezone.offset);
            const timeDiff = eventTime - now;
            const status = getTimezoneStatus(timezone.offset);
            
            const card = document.createElement('div');
            card.className = `timezone-card ${status}`;
            card.dataset.status = status;
            card.dataset.offset = timezone.offset;
            
            let statusBadge, countdownContent;
            
            if (status === 'completed') {
                statusBadge = '<div class="status-badge status-completed">Album Released</div>';
                countdownContent = `
                    <div class="countdown-time" style="color: #28a745;">Released!</div>
                    <div class="countdown-label">Available Now</div>
                `;
            } else if (status === 'active') {
                statusBadge = '<div class="status-badge status-live">Releasing Soon</div>';
                countdownContent = `
                    <div class="countdown-time" id="countdown-${timezone.offset}">${formatCountdown(timeDiff)}</div>
                    <div class="countdown-label">Until Release</div>
                `;
            } else {
                statusBadge = '<div class="status-badge status-upcoming">Upcoming</div>';
                countdownContent = `
                    <div class="countdown-time" id="countdown-${timezone.offset}" style="color: #a8c8ec;">${formatCountdown(timeDiff)}</div>
                    <div class="countdown-label">Until Release</div>
                `;
            }
            
            card.innerHTML = `
                <div class="clock-decoration"></div>
                <div class="timezone-header">
                    <div class="timezone-name">${timezone.name}</div>
                    <div class="timezone-offset">${timezone.offset >= 0 ? '+' : ''}${timezone.offset}</div>
                </div>
                ${statusBadge}
                <div class="countdown-display">
                    ${countdownContent}
                </div>
                <div class="countries-list">
                    ${timezone.countries.map(country => 
                        `<span class="country-tag">${country}</span>`
                    ).join('')}
                </div>
            `;
            
            return card;
        }

        function applyFilter(filterType) {
            const cards = document.querySelectorAll('.timezone-card');
            
            cards.forEach((card, index) => {
                const status = card.dataset.status;
                let shouldShow = false;
                
                switch(filterType) {
                    case 'all':
                        shouldShow = true;
                        break;
                    case 'upcoming':
                        shouldShow = status === 'upcoming';
                        break;
                    case 'active':
                        shouldShow = status === 'active';
                        break;
                    case 'completed':
                        shouldShow = status === 'completed';
                        break;
                }
                
                setTimeout(() => {
                    if (shouldShow) {
                        card.classList.remove('filtering-out', 'hidden');
                        card.classList.add('filtering-in');
                    } else {
                        card.classList.remove('filtering-in');
                        card.classList.add('filtering-out');
                        setTimeout(() => {
                            card.classList.add('hidden');
                        }, 600);
                    }
                }, index * 50); // Stagger the animations
            });
        }

        function renderTimezones() {
            const grid = document.getElementById('timezoneGrid');
            grid.innerHTML = '';
            
            const sortedTimezones = [...timezones].sort((a, b) => b.offset - a.offset);
            
            sortedTimezones.forEach((timezone, index) => {
                const card = createTimezoneCard(timezone);
                
                // Stagger the initial animation
                setTimeout(() => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(30px)';
                    grid.appendChild(card);
                    
                    setTimeout(() => {
                        card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, 50);
                }, index * 100);
            });
        }

        function updateCountdowns() {
            let needsRerender = false;
            
            timezones.forEach((timezone, index) => {
                const element = document.getElementById(`countdown-${timezone.offset}`);
                if (element) {
                    const now = new Date();
                    const eventTime = getTimezoneEventTime(timezone.offset);
                    const timeDiff = eventTime - now;
                    
                    if (timeDiff <= 0) {
                        element.textContent = "Released!";
                        element.style.color = "#28a745";
                    } else {
                        element.textContent = formatCountdown(timeDiff);
                    }
                }
                
                // Check if timezone status has changed
                const currentStatus = getTimezoneStatus(timezone.offset);
                const cards = document.querySelectorAll('.timezone-card');
                const card = cards[timezones.findIndex(tz => tz.offset === timezone.offset && tz.name === timezone.name)];
                
                if (card && !card.classList.contains(currentStatus)) {
                    needsRerender = true;
                }
            });
            
            // Update global progress
            updateGlobalProgress();
            
            if (needsRerender) {
                renderTimezones();
                // Re-apply current filter after re-render
                setTimeout(() => {
                    applyFilter(currentFilter);
                }, 1000);
            }
        }

        function setupFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active button
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Update current filter
                    currentFilter = btn.id.replace('filter', '').toLowerCase();
                    if (currentFilter === 'all') currentFilter = 'all';
                    
                    // Apply filter
                    applyFilter(currentFilter);
                });
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            renderTimezones();
            setupFilterButtons();
            updateGlobalProgress();
            
            // Update countdowns every second
            setInterval(updateCountdowns, 1000);
            
            // Initial filter application after cards are rendered
            setTimeout(() => {
                applyFilter('all');
            }, 2000);
        });
    </script>
</body>
</html>
